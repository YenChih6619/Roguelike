<!DOCTYPE html>
<html lang="zh-TW">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
     <title>卡牌冒險者：即時數值版</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
     <div id="game-container">
          <div id="log">初始化中...</div>
          <div id="central-log"></div>

          <div id="battle-scene">
               <div class="unit" id="enemy">
                    <div class="unit-info">
                         <div id="enemy-name" class="unit-name">敵人</div>
                         <div class="intent" id="enemy-intent">...</div>
                    </div>
                    <div class="avatar">👹</div>
                    <div class="stats">
                         <div class="hp-bar-bg"><div id="enemy-hp" class="hp-bar-fill"></div></div>
                         <div class="stats-row">
                              <span>HP: <span id="enemy-hp-text">0/0</span></span>
                              <span id="enemy-block" class="block-counter">🛡️ 0</span>
                         </div>
                    </div>
               </div>

               <div class="unit" id="player">
                    <div class="avatar">🧙‍♂️</div>
                    <div class="stats">
                         <div class="hp-bar-bg"><div id="player-hp" class="hp-bar-fill"></div></div>
                         <div class="stats-row">
                              <span>HP: <span id="player-hp-text">50/50</span></span>
                              <span id="player-buff" class="buff-counter">⚔️ +0</span>
                              <span id="player-block" class="block-counter">🛡️ 0</span>
                         </div>
                    </div>
               </div>
          </div>

          <div id="deck-ctrl">
               <button class="ctrl-btn" onclick="showPile('draw')">抽牌堆：<span id="draw-count">0</span></button>
               <button class="ctrl-btn" onclick="showPile('deck')">查看全部牌組</button>
               <button class="ctrl-btn" onclick="showPile('discard')">棄牌堆：<span id="discard-count">0</span></button>
          </div>

          <div id="ui-overlay">
               <div id="energy-display">🔋 <span id="energy-value">3</span> / 3</div>
               <button id="end-turn-btn">結束回合</button>
          </div>

          <div id="hand-wrapper">
               <div id="hand"></div>
          </div>

          <div id="reward-modal" class="hidden">
               <div class="reward-content">
                    <h3>戰鬥勝利！選一張卡</h3>
                    <div id="reward-options"></div>
                    <button id="skip-reward-btn">跳過</button>
               </div>
          </div>

          <div id="pile-modal" class="hidden">
               <div class="pile-content">
                    <h3 id="pile-title">牌堆內容</h3>
                    <div id="pile-list"></div>
                    <button onclick="closePile()" class="close-btn">關閉檢視</button>
               </div>
          </div>
     </div>

     <script src="game.js"></script>
</body>
</html>
